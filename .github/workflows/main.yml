name: CI - MedControl
'on':
  push: null
  pull_request: null
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
      - name: Rodar lint
        run: flake8 src
      - name: Rodar testes
        run: pytestRodar testes
        run: pytest
